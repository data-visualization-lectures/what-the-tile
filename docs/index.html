<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <title>地図タイル・ブラウザー</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <link href='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css' rel='stylesheet' />
    <style>
        :root { --dv-header-height: 0px; }
        body { margin:0; padding:0; font-family: sans-serif;}
        #map { position:absolute; top:var(--dv-header-height, 0px); bottom:0; width:100%; }

        #snackbar {
            visibility: hidden; /* Hidden by default. Visible on click */
            min-width: 250px;
            margin-left: -125px; /* Divide value of min-width by 2 */
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 2px;
            padding: 16px;
            position: fixed;
            left: 50%;
            bottom: 30px;
        }

        #snackbar.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.3s 1.7s;
        }

        @keyframes fadein {
            from {bottom: 0; opacity: 0;}
            to {bottom: 30px; opacity: 1;}
        }

        @keyframes fadeout {
            from {bottom: 30px; opacity: 1;}
            to {bottom: 0; opacity: 0;}
        }
    </style>
</head>

<body>
<div id='map'></div>
<div id='snackbar'>クリックしたタイルの情報をコピーしました</div>
</body>
<script src="https://auth.dataviz.jp/lib/supabase.js"></script>
<script src="https://auth.dataviz.jp/lib/dataviz-auth-client.js"></script>
<script>
    (function () {
        function setHeaderHeight(el) {
            if (!el) return;
            var height = el.getBoundingClientRect().height;
            if (height > 0) {
                document.documentElement.style.setProperty("--dv-header-height", height + "px");
            }
        }
        function boot() {
            var header = document.querySelector("dataviz-header");
            if (!header) return;
            setHeaderHeight(header);
            if (window.ResizeObserver) {
                var ro = new ResizeObserver(function () {
                    setHeaderHeight(header);
                });
                ro.observe(header);
            } else {
                window.addEventListener("resize", function () {
                    setHeaderHeight(header);
                });
            }
        }
        window.addEventListener("load", boot);
    })();
</script>
<script src='./bundle.js'></script>
</html>
